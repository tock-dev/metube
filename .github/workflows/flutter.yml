name: Flutter Auto-compilation

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    env:
      JAVA_OPTS: '-Xmx4g' # Give Java 4GB of RAM
      GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            flutter_os: linux
            archive_path: build/linux/x64/release/bundle/
            artifact_name: release.tar.gz
            asset_name: metube-linux-${{ github.ref_name }}.tar.gz
          - os: ubuntu-latest
            flutter_os: apk
            archive_path: -1
            artifact_name: build/app/outputs/flutter-apk/app-release.apk
            asset_name: metube-android-${{ github.ref_name }}.apk
          - os: windows-latest
            flutter_os: windows
            archive_path: build/windows/x64/runner/Release/
            artifact_name: release.zip
            asset_name: metube-windows-${{ github.ref_name }}.zip
          # - os: macos-latest
          #   flutter_os: macos
          #   archive_path: build/macos/Build/Products/Release/
          #   artifact_name: release.app
          #   asset_name: metube-macos
          # - os: macos-latest
          #   flutter_os: ios
          #   archive_path: build/ios/ipa/
          #   artifact_name: release.zip
          #   asset_name: metube-ios
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - name: Linux dependencies
        if: matrix.flutter_os == 'linux'
        run: |
          sudo apt update -y
          sudo apt install -y ninja-build libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build
        run: |
          flutter pub get
          flutter build ${{ matrix.flutter_os }}
      - name: List files (Debug)
        run: ls -R build/
      - name: Archive - Linux
        if: matrix.flutter_os == 'linux'
        run: |
          original_path=$(pwd)
          cd ${{ matrix.archive_path }}
          tar cvzf $original_path/${{ matrix.artifact_name }} .
          cd $original_path
      - name: Archive - Windows
        if: matrix.flutter_os == 'windows'
        run: |
          set "ORIGINAL_PATH=%CD%"
          cd /d "${{ matrix.archive_path }}"
          tar -a -c -f "%ORIGINAL_PATH%/${{ matrix.artifact_name }}" *
          cd /d "%ORIGINAL_PATH%"
      - name: Upload
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
